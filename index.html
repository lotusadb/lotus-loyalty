const fs = { fontFamily: "Georgia, serif" };
const fmt = (n) => "€" + Number(n).toFixed(2).replace(".", ",");
const fmtPts = (n) => Math.floor(n) + " punten";

const defaultThresholds = [
  { id:"t1", omzet:100,  korting:2.50,  label:"€2,50 korting",  code:"LOTUS100" },
  { id:"t2", omzet:250,  korting:5.00,  label:"€5,00 korting",  code:"LOTUS200" },
  { id:"t3", omzet:300,  korting:10.00, label:"€10,00 korting", code:"LOTUS300" },
  { id:"t4", omzet:400,  korting:12.50, label:"€12,50 korting", code:"LOTUS400" },
  { id:"t5", omzet:500,  korting:15.00, label:"€15,00 korting", code:"LOTUS500" },
  { id:"t6", omzet:750,  korting:29.95, label:"Gratis make-up adviesgesprek (€29,95)", code:"ADVIES750" },
];

const getCurrentThreshold = (pts, thresholds) => {
  const earned = thresholds.filter(t => pts >= t.omzet);
  return earned.length > 0 ? earned[earned.length - 1] : null;
};
const getNextThreshold = (pts, thresholds) => thresholds.find(t => pts < t.omzet) || null;

const useLS = (key, fallback) => {
  const [val, setVal] = useState(() => {
    try { const v = localStorage.getItem(key); return v ? JSON.parse(v) : fallback; } catch { return fallback; }
  });
  const save = (v) => { setVal(v); try { localStorage.setItem(key, JSON.stringify(v)); } catch {} };
  return [val, save];
};

  h3: { fontSize:16, fontWeight:500, margin:"0 0 0.75rem", color:C.greenDeep },
  label: { fontSize:13, color:C.textMuted, display:"block", marginBottom:4 },
  btnPrimary: { ...fs, cursor:"pointer", background:C.greenDeep, color:C.white, border:"none", padding:"9px 22px", borderRadius:8, fontWeight:500, fontSize:14 },
  btnSm: { cursor:"pointer", fontSize:12, padding:"4px 10px", borderRadius:6, border:"0.5px solid " + C.border, background:"transparent", color:C.text },

  tab: (a) => ({ ...fs, cursor:"pointer", padding:"8px 14px", borderRadius:8, fontWeight:a?500:400, background:a?C.green:"transparent", border:a?"0.5px solid " + C.border:"none", fontSize:13, color:a?C.greenDeep:C.textMuted }),
  badge: (t) => ({ display:"inline-block", padding:"2px 8px", borderRadius:6, fontSize:12, fontWeight:500, background:t==="earn"?"#edf7ef":t==="redeem"?"#fcebeb":t==="pending"?"#fef9c3":"#f0fdf4", color:t==="earn"?C.greenDeep:t==="redeem"?"#a32d2d":t==="pending"?"#854d0e":"#166534" }),
  metric: { background:C.greenLight, borderRadius:10, padding:"1rem", textAlign:"center", border:"0.5px solid " + C.border },
  avatar: { width:36, height:36, borderRadius:"50%", background:C.green, display:"flex", alignItems:"center", justifyContent:"center", fontSize:13, fontWeight:500, color:C.greenDeep, border:"0.5px solid " + C.border, flexShrink:0 },

function App() {
  const [customers, setCustomers] = useLS("lotus_customers_v4", []);
  const [requests, setRequests] = useLS("lotus_requests_v2", []);
  const [thresholds, setThresholds] = useLS("lotus_thresholds_v1", defaultThresholds);
  const [session, setSession] = useState(null);
  const [view, setView] = useState("login");
  const [loginEmail, setLoginEmail] = useState("");
  const [loginPw, setLoginPw] = useState("");
  const [loginErr, setLoginErr] = useState("");
  const [adminTab, setAdminTab] = useState("customers");
  const [selectedCust, setSelectedCust] = useState(null);
  const [newCust, setNewCust] = useState({ name:"", email:"", password:"", birthday:"" });
  const [addCustErr, setAddCustErr] = useState("");
  const [successMsg, setSuccessMsg] = useState("");
  const [discountCodes, setDiscountCodes] = useState({});
  const [orderCust, setOrderCust] = useState("");
  const [orderAmt, setOrderAmt] = useState("");
  const [orderNr, setOrderNr] = useState("");
  const [orderDesc, setOrderDesc] = useState("");
  const [orderErr, setOrderErr] = useState("");
  const [copiedLink, setCopiedLink] = useState(false);
  const [editingT, setEditingT] = useState(null);
  const [newT, setNewT] = useState({ omzet:"", korting:"", code:"" });
  const [tErr, setTErr] = useState("");
  const [importErr, setImportErr] = useState("");
  const [importSuccess, setImportSuccess] = useState("");
  const [vipCodes, setVipCodes] = useState({});

  const saveVipCode = (custId) => {
    const code = vipCodes[custId]?.trim();
    if (!code) return;
    const cust = getCust(custId);
    setCustomers(customers.map(c => c.id === custId ? { ...c, vipCode: code } : c));
    stuurVipMail(cust.name, cust.email, code);
    flash("VIP-code opgeslagen en welkomstmail verstuurd naar " + cust.email + "!");
  };

  useEffect(() => {
    const p = new URLSearchParams(window.location.search);
    if (p.get("bedrag")) setOrderAmt(p.get("bedrag"));
    if (p.get("order")) setOrderNr(p.get("order"));
    if (p.get("bedrag") || p.get("email")) setAdminTab("orders");
    if (p.get("email")) {
      const match = customers.find(c => c.email.toLowerCase() === p.get("email").toLowerCase());
      if (match) setOrderCust(String(match.id));
    }
  }, []);

  const flash = (msg) => { setSuccessMsg(msg); setTimeout(() => setSuccessMsg(""), 4000); };
  const getCust = (id) => customers.find(c => c.id === id);
  const pendingRequests = requests.filter(r => r.status === "pending");
  const myRequests = session?.role === "customer" ? requests.filter(r => r.custId === session.id) : [];

  const handleLogin = () => {
    setLoginErr("");
    if (loginEmail === ADMIN_EMAIL && loginPw === ADMIN_PASSWORD) { setSession({ role:"admin" }); setView("admin"); return; }
    const c = customers.find(x => x.email === loginEmail && x.password === hashPw(loginPw));
    if (c) { setSession({ role:"customer", id:c.id }); setView("customer"); return; }
    setLoginErr("E-mailadres of wachtwoord onjuist.");
  };

  const logout = () => { setSession(null); setView("login"); setLoginEmail(""); setLoginPw(""); setSelectedCust(null); };

  const processOrder = () => {
    setOrderErr("");
    const amt = parseFloat(orderAmt);
    if (!orderCust) { setOrderErr("Selecteer een klant."); return; }
    if (!amt || amt <= 0) { setOrderErr("Voer een geldig bedrag in."); return; }
    const today = new Date().toISOString().slice(0,10);
    const desc = orderDesc || ("Webshop bestelling" + (orderNr ? " #" + orderNr : ""));
    const cid = parseInt(orderCust);
    const cust = getCust(cid);
    const prev = getCurrentThreshold(cust.totalSpend, thresholds);
    const newSpend = cust.totalSpend + amt;
    const next = getCurrentThreshold(newSpend, thresholds);
    const newlyReached = next && (!prev || next.id !== prev.id);
    setCustomers(customers.map(c => c.id === cid ? { ...c, totalSpend:newSpend, transactions:[{ date:today, desc, amount:amt, type:"purchase" }, ...c.transactions] } : c));
    if (newlyReached) {
      stuurKlantMail(cust.name, cust.email, next.label, next.code);
      stuurAdminMail(cust.name, cust.email, next.label);
    }
    setOrderAmt(""); setOrderNr(""); setOrderCust(""); setOrderDesc("");
    flash(fmtPts(amt) + " toegevoegd!" + (newlyReached ? " 🎉 E-mail verstuurd naar " + cust.email + "!" : ""));
  };

  const approveRequest = (reqId) => {
    const code = discountCodes[reqId]?.trim();
    if (!code) return;
    const req = requests.find(r => r.id === reqId);
    const today = new Date().toISOString().slice(0,10);
    setRequests(requests.map(r => r.id === reqId ? { ...r, status:"approved", code } : r));
    setCustomers(customers.map(c => c.id === req.custId ? { ...c, transactions:[{ date:today, desc:"Korting ingewisseld: " + req.rewardLabel, amount:-req.korting, type:"redeem" }, ...c.transactions] } : c));
    flash("Aanvraag goedgekeurd!");
  };

  const rejectRequest = (reqId) => { setRequests(requests.map(r => r.id === reqId ? { ...r, status:"rejected" } : r)); flash("Aanvraag afgewezen."); };

  const addCustomer = () => {
    setAddCustErr("");
    if (!newCust.name || !newCust.email || !newCust.password) { setAddCustErr("Naam, e-mail en wachtwoord zijn verplicht."); return; }
    if (customers.find(c => c.email === newCust.email)) { setAddCustErr("Dit e-mailadres bestaat al."); return; }
    setCustomers([...customers, { id:Date.now(), name:newCust.name, email:newCust.email, password:hashPw(newCust.password), totalSpend:0, birthday:newCust.birthday, transactions:[] }]);
    setNewCust({ name:"", email:"", password:"", birthday:"" }); flash("Klant toegevoegd!");
  };

  const handleImport = (e) => {
    setImportErr(""); setImportSuccess("");
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
      const lines = ev.target.result.split("\n").filter(l => l.trim());
      const newCustomers = [];
      let skipped = 0;
      lines.forEach((line, i) => {
        if (i === 0 && line.toLowerCase().includes("naam")) return;
        const parts = line.split(",").map(p => p.trim().replace(/^"|"$/g, ""));
        if (parts.length < 3) { skipped++; return; }
        const [name, email, password] = parts;
        if (!name || !email || !password) { skipped++; return; }
        if (customers.find(c => c.email.toLowerCase() === email.toLowerCase())) { skipped++; return; }
        if (newCustomers.find(c => c.email.toLowerCase() === email.toLowerCase())) { skipped++; return; }
        newCustomers.push({ id:Date.now() + i, name, email, password:hashPw(password), totalSpend:0, birthday:"", transactions:[] });
      });
      if (newCustomers.length === 0) { setImportErr("Geen nieuwe klanten gevonden."); return; }
      setCustomers([...customers, ...newCustomers]);
      setImportSuccess(newCustomers.length + " klant(en) geimporteerd" + (skipped > 0 ? ", " + skipped + " overgeslagen." : "."));
      e.target.value = "";
    };
    reader.readAsText(file);
  };

  const saveThreshold = () => {
    setTErr("");
    const omzet = parseFloat(newT.omzet), korting = parseFloat(newT.korting);
    if (!omzet || omzet <= 0) { setTErr("Voer een geldig puntenaantal in."); return; }
    if (!korting || korting <= 0) { setTErr("Voer een geldig kortingsbedrag in."); return; }
    if (!newT.code.trim()) { setTErr("Voer een kortingscode in."); return; }
    const label = "€" + korting.toFixed(2).replace(".", ",") + " korting";
    const sorted = (list) => [...list].sort((a,b) => a.omzet - b.omzet);
    if (editingT) {
      setThresholds(sorted(thresholds.map(t => t.id === editingT ? { ...t, omzet, korting, label, code:newT.code.trim().toUpperCase() } : t)));
      flash("Drempel bijgewerkt!");
    } else {
      setThresholds(sorted([...thresholds, { id:"t_"+Date.now(), omzet, korting, label, code:newT.code.trim().toUpperCase() }]));
      flash("Drempel toegevoegd!");
    }
    setEditingT(null); setNewT({ omzet:"", korting:"", code:"" }); setTErr("");
  };

  const deleteThreshold = (id) => { setThresholds(thresholds.filter(t => t.id !== id)); flash("Drempel verwijderd."); };
  const startEditT = (t) => { setEditingT(t.id); setNewT({ omzet:String(t.omzet), korting:String(t.korting), code:t.code }); };

  const appUrl = window.location.origin + window.location.pathname;
  const orderMailLink = appUrl + "?bedrag={order_total}&email={customer_email}&order={order_number}";
  const copyLink = () => { navigator.clipboard.writeText(orderMailLink).then(() => { setCopiedLink(true); setTimeout(() => setCopiedLink(false), 2500); }); };

  const Header = ({ subtitle }) => (
    <div style={{ display:"flex", flexDirection:"column", alignItems:"center", textAlign:"center", padding:"1.5rem 0 1rem", borderBottom:"0.5px solid " + C.border, marginBottom:"1.5rem" }}>
      <Logo />
      <h1 style={{ ...fs, fontSize:22, fontWeight:400, margin:"10px 0 2px", letterSpacing:"0.03em" }}>Lotus Mineral Visagie</h1>
      <p style={{ margin:0, fontSize:12, color:C.textMuted, letterSpacing:"0.07em", textTransform:"uppercase" }}>{subtitle}</p>
    </div>
  );

  const ProgressBar = ({ pts }) => {
    const max = thresholds[thresholds.length-1]?.omzet || 750;
    const pct = Math.min((pts/max)*100, 100);
    return (
      <div style={{ marginBottom:"1.5rem" }}>
        <div style={{ display:"flex", justifyContent:"space-between", marginBottom:6 }}>
          <span style={{ fontSize:13, color:C.textMuted }}>Puntensaldo</span>
          <span style={{ fontSize:13, fontWeight:500, color:C.greenDeep }}>{fmtPts(pts)}</span>
        </div>
        <div style={{ height:10, background:C.green, borderRadius:10, overflow:"hidden", border:"0.5px solid " + C.border }}>
          <div style={{ height:"100%", width:pct+"%", background:C.greenDeep, borderRadius:10, transition:"width 0.4s ease" }} />
        </div>
        <div style={{ display:"flex", justifyContent:"space-between", marginTop:4 }}>
          {thresholds.map(t => <span key={t.id} style={{ fontSize:10, color:pts>=t.omzet?C.greenDeep:C.textMuted, fontWeight:pts>=t.omzet?500:400 }}>{t.omzet}</span>)}
        </div>
      </div>
    );
  };

              <select style={{ ...s.inp, borderColor:"#f59e0b" }} value={selectedCust||""} onChange={e => setSelectedCust(Number(e.target.value)||null)}>
                <option value="">— Kies een klant —</option>
                {customers.map(c => <option key={c.id} value={c.id}>{c.name} {c.vipCode?"(VIP ✓)":""}</option>)}
              </select>
            </div>
            {selectedCust && getCust(selectedCust) && (
              <div style={{ marginBottom:16 }}>
                <label style={{ ...s.label, color:"#92400e" }}>Persoonlijke VIP-code</label>
                <input value={vipCodes[selectedCust]||getCust(selectedCust).vipCode||""} onChange={e => setVipCodes({ ...vipCodes, [selectedCust]:e.target.value })} placeholder={"bv. LOTUSVIP-" + getCust(selectedCust).name.split(" ")[0].toUpperCase()} style={{ borderColor:"#f59e0b" }} />
              </div>
            )}
            <button style={{ ...s.btnPrimary, background:"#b45309", opacity:selectedCust&&vipCodes[selectedCust]?.trim()?1:0.4 }} onClick={() => selectedCust && saveVipCode(selectedCust)} disabled={!selectedCust||!vipCodes[selectedCust]?.trim()}>
              <i className="ti ti-crown" /> VIP-code opslaan & mail versturen
            </button>
          </div>
          <div style={s.card}>
            <h3 style={s.h3}>Huidige VIP-leden</h3>
            {customers.filter(c=>c.vipCode).length===0 ? <p style={{ color:C.textMuted, fontSize:14 }}>Nog geen VIP-leden.</p> : (
              <div style={{ display:"flex", flexDirection:"column", gap:8 }}>
                {customers.filter(c=>c.vipCode).map(c => (
                  <div key={c.id} style={{ display:"flex", alignItems:"center", justifyContent:"space-between", padding:"10px 12px", background:"#fef9c3", borderRadius:8, border:"1px solid #f59e0b" }}>
                    <div style={{ display:"flex", alignItems:"center", gap:10 }}>
                      <i className="ti ti-crown" style={{ fontSize:18, color:"#b45309" }} />
                      <div><p style={{ fontSize:14, fontWeight:500 }}>{c.name}</p><p style={{ fontSize:12, color:"#92400e" }}>{c.email}</p></div>
                    </div>
                    <p style={{ fontSize:14, fontWeight:500, color:"#b45309", letterSpacing:"0.05em" }}>{c.vipCode}</p>
                  </div>
                ))}
              </div>
            )}
          </div>
        </div>
      )}


        <div style={s.card}>
          <h3 style={s.h3}>Nieuwe klant toevoegen</h3>
          <div style={{ marginBottom:12 }}><label style={s.label}>Naam</label><input value={newCust.name} onChange={e => setNewCust({ ...newCust, name:e.target.value })} placeholder="Voor- en achternaam" /></div>
          <div style={{ marginBottom:12 }}><label style={s.label}>E-mailadres</label><input type="email" value={newCust.email} onChange={e => setNewCust({ ...newCust, email:e.target.value })} placeholder="klant@email.nl" /></div>
          <div style={{ marginBottom:12 }}><label style={s.label}>Wachtwoord</label><input type="text" value={newCust.password} onChange={e => setNewCust({ ...newCust, password:e.target.value })} placeholder="Tijdelijk wachtwoord" /></div>
          <div style={{ marginBottom:16 }}><label style={s.label}>Geboortedatum</label><input type="date" value={newCust.birthday} onChange={e => setNewCust({ ...newCust, birthday:e.target.value })} /></div>
          {addCustErr && <p style={{ color:"#a32d2d", fontSize:13, marginBottom:12 }}>{addCustErr}</p>}
          <button style={s.btnPrimary} onClick={addCustomer}>Klant toevoegen</button>
        </div>
      )}
    </div>
  );

  return null;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
